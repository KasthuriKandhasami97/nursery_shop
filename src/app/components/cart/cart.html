<div class="container mt-4">

  <h2 class="mb-4">
    Shopping Cart
  </h2>
  <button
    class="btn btn-secondary mb-3"
    (click)="goBack()">

    ← Back

  </button>
  <div
    class="alert alert-warning"
    *ngIf="cartItems.length === 0">

    Your cart is empty 🛒

  </div>

  <div
    class="card mb-3"
    *ngFor="let item of cartItems; let i = index">

    <div class="row g-0">

      <div class="col-md-3">

        <img
          [src]="item.image"
          class="card-img"
          alt="{{item.name}}">

      </div>

      <div class="col-md-9">

        <div class="card-body">

          <h5 class="card-title">
            {{item.name}}
          </h5>

          <p class="card-text">
            Price: ₹{{item.price}}
          </p>

          <div class="mb-3">

            <button
              class="btn btn-warning me-2"
              (click)="decreaseQty(i)">

              -

            </button>

            <strong>
              {{item.quantity}}
            </strong>

            <button
              class="btn btn-success ms-2"
              (click)="increaseQty(i)">

              +

            </button>

          </div>

          <p>

            Item Total:
            ₹{{item.price * item.quantity}}

          </p>

          <button
            class="btn btn-danger"
            (click)="removeItem(i)">

            Remove

          </button>

        </div>

      </div>

    </div>

  </div>

  <div
    class="alert alert-success mt-3"
    *ngIf="cartItems.length > 0">

    <strong>
      Grand Total:
      ₹{{getTotal()}}
    </strong>

  </div>
<a
  routerLink="/checkout"
  class="btn btn-success">

  Proceed To Checkout

</a>
   

</div>
